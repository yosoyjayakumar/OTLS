<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTLS</title>
    <style>
        :root {
            --primary: #f5a030;
            --dark: #141414;
            --light: #f5f5f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            color: var(--primary);
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
        }
        .version {
            padding: 5px 2% 5px;
            font-size: 1rem;
            font-weight: 600;
        }
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.3), var(--dark)), url('');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 4%;
            justify-content: flex-start;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }
        .hero::-webkit-scrollbar { display: none; }
        .hero-content {
            max-width: 600px;
        }
        .hero-title { font-size: 4rem; margin-bottom: 10px; }
        .hero-desc { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; }
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { background-color: rgba(109, 109, 110, 0.7); color: white; margin-left: 10px; }
        .btn:hover { opacity: 0.8; }
        
        .section-title {
            padding: 20px 4% 10px;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .movie-row {
            display: flex;
            overflow-x: auto;
            padding: 10px 4% 40px;
            gap: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .movie-row::-webkit-scrollbar { display: none; }
        .movie-card {
            flex: 0 0 250px;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }
        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        .movie-card img {
            width: 100%;
            border-radius: 4px;
            display: block;
        }
        .movie-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .movie-card:hover .movie-info { opacity: 1; }

        .hero-card {
            flex: 1 0 300px;
            height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
            max-width: 400px;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            scroll-snap-align: center;
        }
        .hero-card:hover { transform: scale(1.05); z-index: 5; border-color: var(--primary); }
        .hero-card-content {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .hero-card h3 { margin-bottom: 10px; font-size: 1.5rem; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .video-container {
            width: 80%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
        }
        .play-icon {
            font-size: 4rem;
            color: rgba(255,255,255,0.5);
        }
        .search-box {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            color: #fff;
            margin: 0 20px;
            width: 300px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            outline: none;
        }
        .search-box:focus {
            background: rgba(0, 0, 0, 0.9);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(86, 243, 91, 0.2);
            width: 320px;
        }
        .search-box::placeholder {
            color: #aaa;
        }
        @media (min-width: 1024px) {
            .hero { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">OTLS</a>

        <div style="display: flex; align-items: center; gap: 8px;">
            <button id="updateListBtn" class="btn btn-secondary" type="button">Update List</button>
            <button id="refreshBtn" class="btn btn-secondary" type="button">Refresh</button>
            <button id="saveBtn" class="btn btn-primary" type="button">Save</button>
        </div>

        <input type="text" class="search-box" id="searchInput" placeholder="Search movies...">
        <div class="user-nav">
            <a class="version">Version 0.0.1</a>
        </div>
    </header>

    <div id="movies-list"></div>

    <div class="modal" id="videoModal">
        <span class="close-modal" onclick="closePlayer()">&times;</span>
        <div class="video-container">
            <video id="videoPlayer" controls style="width:100%; height:100%;" preload="metadata">
                Your browser does not support the HTML5 Video element.
            </video>
            <div id="player-text" style="text-align: center; position: absolute; bottom: 15px; left: 20px; color: white; text-shadow: 0 0 6px rgba(0,0,0,0.9);">
                <h2 id="playing-title" style="margin: 0;">Movie Title</h2>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content" style="background: #111; padding: 20px; border-radius: 8px; width: min(95%, 760px); max-height: 80vh; overflow: auto; position: relative;">
            <h2 style="margin: 0 0 10px;">Edit Movie List</h2>
            <p style="margin: 0 0 10px; color: #aaa;">One file name per line. Format: Title - YYYY.ext</p>
            <textarea id="editListTextarea" style="width:100%; height: 300px; background: #222; color: #eee; border: 1px solid #333; padding: 10px; border-radius: 4px;"></textarea>
            <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="saveManualBtn" class="btn btn-primary" type="button">Save Manual List</button>
                <button id="loadFromJsonBtn" class="btn btn-secondary" type="button">Refresh from JSON</button>
                <button id="closeEditModalBtn" class="btn btn-secondary" type="button">Close</button>
            </div>
        </div>
    </div>
    
    <script>
        const fallbackMovieFiles = [
            "Aaromaley - 2024.mkv",
            "Dude - 2025.mkv",
            "Telusu Kada - 2025.mkv"
        ];

        function parseMovieFile(fileName) {
            const noExt = fileName.replace(/\.[^/.]+$/, '');
            const parts = noExt.split(' - ');
            let year = 0;
            let title = noExt;

            if (parts.length >= 2) {
                const parsedYear = parseInt(parts[parts.length - 1], 10);
                if (!Number.isNaN(parsedYear)) {
                    year = parsedYear;
                    title = parts.slice(0, -1).join(' - ').trim();
                }
            }

            return {
                title: title || noExt,
                year,
                fileName,
                img: './posters/ironman.jpg',
                src: `./Movies/${encodeURIComponent(fileName)}`
            };
        }

        function buildMovieList(fileNames) {
            return fileNames
                .filter(name => typeof name === 'string' && name.trim())
                .map(parseMovieFile)
                .sort((a, b) => {
                    if (b.year !== a.year) return b.year - a.year;
                    return a.title.localeCompare(b.title);
                });
        }

        let moviesData = [];

        function loadMoviesFromLocalStorage() {
            try {
                const raw = localStorage.getItem('otls-movie-files');
                if (!raw) return null;
                const list = JSON.parse(raw);
                if (!Array.isArray(list)) return null;
                return list.filter(x => typeof x === 'string' && x.trim());
            } catch (e) {
                console.warn('Could not parse local storage movie list', e);
                return null;
            }
        }

        function saveMoviesToLocalStorage(fileNames) {
            localStorage.setItem('otls-movie-files', JSON.stringify(fileNames));
        }

        async function loadMoviesFromJson() {
            const storageFiles = loadMoviesFromLocalStorage();
            if (storageFiles) {
                moviesData = buildMovieList(storageFiles);
                renderMovies();
                return;
            }

            try {
                const response = await fetch('./movies.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (Array.isArray(data) && data.length > 0) {
                    const files = data.map(x => x.fileName).filter(x => typeof x === 'string' && x.trim());
                    moviesData = buildMovieList(files);
                    renderMovies();
                    return;
                }
                throw new Error('Empty JSON data');
            } catch (err) {
                console.warn('Could not load movies.json - falling back to in-script list:', err);
                moviesData = buildMovieList(fallbackMovieFiles);
                renderMovies();
            }
        }

        function openEditModal() {
            const modal = document.getElementById('editModal');
            const textarea = document.getElementById('editListTextarea');
            textarea.value = moviesData.map(m => m.fileName).join('\n');
            modal.classList.add('active');
            textarea.focus();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveManualList() {
            const textarea = document.getElementById('editListTextarea');
            const lines = textarea.value.split('\n').map(l => l.trim()).filter(l => l);
            if (lines.length === 0) {
                alert('Please enter at least one movie file name.');
                return;
            }
            moviesData = buildMovieList(lines);
            saveMoviesToLocalStorage(lines);
            renderMovies();
            closeEditModal();
        }

        function refreshFromJson() {
            localStorage.removeItem('otls-movie-files');
            loadMoviesFromJson();
            closeEditModal();
        }

        function createCard(movie) {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => openPlayer(movie.title, movie.src);

            card.innerHTML = `
                <img src="${movie.img}" alt="${movie.title}">
                <div class="movie-info">
                    <h4>${movie.title} (${movie.year || 'N/A'})</h4>
                </div>
            `;
            return card;
        }

        function renderMovies(filter = "") {
            const container = document.getElementById('movies-list');
            container.innerHTML = '';

            const filterText = filter.toLowerCase();
            const filtered = moviesData.filter(m => m.title.toLowerCase().includes(filterText));
            if (filtered.length === 0) {
                container.innerHTML = '<p style="padding: 20px; color: #aaa;">No movies found.</p>';
                return;
            }

            const years = [...new Set(filtered.map(m => m.year || 0))].sort((a, b) => b - a);

            for (const year of years) {
                const yearMovies = filtered.filter(m => (m.year || 0) === year);
                if (yearMovies.length === 0) continue;

                const title = document.createElement('h2');
                title.className = 'section-title';
                title.textContent = year > 0 ? year : 'Unknown Year';

                const row = document.createElement('div');
                row.className = 'movie-row';
                yearMovies.forEach(movie => row.appendChild(createCard(movie)));

                container.appendChild(title);
                container.appendChild(row);
            }
        }

        function openPlayer(title, src) {
            const modal = document.getElementById('videoModal');
            const titleEl = document.getElementById('playing-title');
            const player = document.getElementById('videoPlayer');

            titleEl.textContent = "Now Playing: " + title;
            player.src = src;
            player.load();
            player.play().catch(() => {
                // autoplay may be blocked; user can click play
            });

            modal.classList.add('active');
        }

        function closePlayer() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');

            player.pause();
            player.removeAttribute('src');
            player.load();
            modal.classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadMoviesFromJson();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderMovies(e.target.value);
            });

            document.getElementById('updateListBtn').addEventListener('click', openEditModal);
            document.getElementById('refreshBtn').addEventListener('click', refreshFromJson);
            document.getElementById('saveBtn').addEventListener('click', () => {
                saveMoviesToLocalStorage(moviesData.map(m => m.fileName));
                alert('Current list saved to local storage.');
            });

            document.getElementById('saveManualBtn').addEventListener('click', saveManualList);
            document.getElementById('loadFromJsonBtn').addEventListener('click', refreshFromJson);
            document.getElementById('closeEditModalBtn').addEventListener('click', closeEditModal);

            document.getElementById('editModal').addEventListener('click', (event) => {
                if (event.target.id === 'editModal') closeEditModal();
            });
        });
    </script>
</body>
</html>
