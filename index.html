<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTLS</title>
    <style>
        :root {
            --primary: #56f35b;
            --dark: #141414;
            --light: #f5f5f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            color: var(--primary);
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
        }
        .version {
            padding: 5px 2% 5px;
            font-size: 1rem;
            font-weight: 600;
        }
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.3), var(--dark)), url('');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 4%;
            justify-content: flex-start;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }
        .hero::-webkit-scrollbar { display: none; }
        .hero-content {
            max-width: 600px;
        }
        .hero-title { font-size: 4rem; margin-bottom: 10px; }
        .hero-desc { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; }
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { background-color: rgba(109, 109, 110, 0.7); color: white; margin-left: 10px; }
        .btn:hover { opacity: 0.8; }
        
        .section-title {
            padding: 20px 4% 10px;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .movie-row {
            display: flex;
            overflow-x: auto;
            padding: 10px 4% 40px;
            gap: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .movie-row::-webkit-scrollbar { display: none; }
        .movie-card {
            flex: 0 0 250px;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }
        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        .movie-card img {
            width: 100%;
            border-radius: 4px;
            display: block;
        }
        .movie-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .movie-card:hover .movie-info { opacity: 1; }

        .hero-card {
            flex: 1 0 300px;
            height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
            max-width: 400px;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            scroll-snap-align: center;
        }
        .hero-card:hover { transform: scale(1.05); z-index: 5; border-color: var(--primary); }
        .hero-card-content {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .hero-card h3 { margin-bottom: 10px; font-size: 1.5rem; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .video-container {
            width: 80%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
        }
        .play-icon {
            font-size: 4rem;
            color: rgba(255,255,255,0.5);
        }
        .search-box {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            color: #fff;
            margin: 0 20px;
            width: 300px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            outline: none;
        }
        .search-box:focus {
            background: rgba(0, 0, 0, 0.9);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(86, 243, 91, 0.2);
            width: 320px;
        }
        .search-box::placeholder {
            color: #aaa;
        }
        @media (min-width: 1024px) {
            .hero { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">OTLS</a>
        <input type="text" class="search-box" id="searchInput" placeholder="Search movies...">
        <div class="user-nav">
            <a class="version">Version 0.0.1</a>
        </div>
    </header>

    <div class="hero">
        <div class="hero-card" style="background-image: url('./posters/ironman.jpg');" onclick="openPlayer('Top Pick 1')">
            <div class="hero-card-content">
                <h3>MCU</h3>
            </div>
        </div>
        <div class="hero-card" style="background-image: url('#');" onclick="openPlayer('Top Pick 2')">
            <div class="hero-card-content">
                <h3>DC</h3>
            </div>
        </div>
        <div class="hero-card" style="background-image: url('#');" onclick="openPlayer('Top Pick 3')">
            <div class="hero-card-content">
                <h3>Star Wars</h3>
            </div>
        </div>
        <div class="hero-card" style="background-image: url('#');" onclick="openPlayer('Top Pick 3')">
            <div class="hero-card-content">
                <h3>Star Wars</h3>
            </div>
        </div>
    </div>

    <h2 class="section-title">Universe</h2>
    <div class="movie-row" id="trending-row"></div>

    <h2 class="section-title">New Releases</h2>
    <div class="movie-row" id="new-row"></div>

    <div class="modal" id="videoModal">
        <span class="close-modal" onclick="closePlayer()">&times;</span>
        <div class="video-container">
            <div id="player-text" style="text-align: center;">
                <div class="play-icon">▶</div>
                <h2 id="playing-title" style="margin-top: 20px;">Movie Title</h2>
                <p style="color: #aaa;">Streaming Simulation...</p>
            </div>
        </div>
    </div>
    
    <script>
        const trendingMovies = [
            { title: "Cyber City", img: "./posters/ironman.jpg" },
            { title: "Lost in Time", img: "./posters/ironman.jpg" },
            { title: "The Racer", img: "./posters/ironman.jpg" },
            { title: "Deep Blue", img: "./posters/ironman.jpg" },
            { title: "Mountain Peak", img: "./posters/ironman.jpg" },
            { title: "Space Walk", img: "./posters/ironman.jpg" },
        ];

        const newMovies = [
            { title: "Comedy Central", img: "#" },
            { title: "Dark Forest", img: "#" },
            { title: "Urban Legend", img: "#" },
            { title: "The Chef", img: "#" },
            { title: "Code Red", img: "#" },
        ];

        function createCard(movie) {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => openPlayer(movie.title);
            
            card.innerHTML = `
                <img src="${movie.img}" alt="${movie.title}">
                <div class="movie-info">
                    <h4>${movie.title}</h4>
                </div>
            `;
            return card;
        }

        function renderMovies(filter = "") {
            const trendingContainer = document.getElementById('trending-row');
            const newContainer = document.getElementById('new-row');

            trendingContainer.innerHTML = '';
            newContainer.innerHTML = '';

            const filterText = filter.toLowerCase();

            trendingMovies.filter(m => m.title.toLowerCase().includes(filterText))
                .forEach(movie => trendingContainer.appendChild(createCard(movie)));
            newMovies.filter(m => m.title.toLowerCase().includes(filterText))
                .forEach(movie => newContainer.appendChild(createCard(movie)));
        }

        function openPlayer(title) {
            const modal = document.getElementById('videoModal');
            const titleEl = document.getElementById('playing-title');
            titleEl.textContent = "Now Playing: " + title;
            modal.classList.add('active');
        }

        function closePlayer() {
            const modal = document.getElementById('videoModal');
            modal.classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMovies();
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderMovies(e.target.value);
            });
        });
    </script>
</body>
</html>
